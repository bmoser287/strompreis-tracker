name: Daten-Scraper und Diagramm-Generator

on:
  schedule:
    # Läuft alle 15 Minuten (GitHub-Limit beachten)
    - cron: '*/15 * * * *'
  workflow_dispatch: # Ermöglicht manuellen Start per Klick auf GitHub!

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Erlaubt GitHub, die aktualisierte CSV und das Diagramm hochzuladen

    steps:
    - name: Code auschecken
      uses: actions/checkout@v4

    - name: Python installieren
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Abhängigkeiten installieren
      run: |
        python -m pip install --upgrade pip
        pip install pandas matplotlib

    - name: Skript starten
      run: python tracker.py

    - name: Änderungen im Repository speichern
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add strompreise.csv strompreis_chart.png
        git commit -m "Daten-Update: $(date)" || exit 0
        git push
