<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Live Börsenstrom-Dashboard</title>
    <!-- Chart.js für das interaktive Diagramm laden -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --primary-color: #2ca02c;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 {
            margin: 0 0 10px 0;
            color: #1a202c;
        }
        .subtitle {
            color: #718096;
            font-size: 1.1rem;
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            padding: 24px;
            margin-bottom: 20px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .info-box {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }
        .info-box span {
            display: block;
            font-size: 0.9rem;
            color: #718096;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .info-box strong {
            font-size: 1.5rem;
            color: var(--primary-color);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>⚡ Live Börsenstrom-Dashboard</h1>
        <p class="subtitle">Automatisiertes Forschungs-Dashboard via GitHub Actions & GitHub Pages</p>
    </header>

    <!-- Info-Boxen für die Kennzahlen -->
    <div class="info-grid">
        <div class="info-box">
            <span>Datenquelle</span>
            <strong>GitHub CSV</strong>
        </div>
        <div class="info-box">
            <span>Interaktivität</span>
            <strong>Chart.js Live</strong>
        </div>
        <div class="info-box">
            <span>Hosting</span>
            <strong>Serverless Pages</strong>
        </div>
    </div>

    <!-- Die interaktive Diagramm-Karte -->
    <div class="card">
        <canvas id="stromChart" style="width: 100%; height: 400px;"></canvas>
    </div>
</div>

<script>
    // CSV-Daten per Ajax/fetch laden
    fetch('strompreise.csv')
        .then(response => {
            if (!response.ok) {
                throw new Error("CSV-Datei konnte nicht geladen werden.");
            }
            return response.text();
        })
        .then(csvData => {
            const lines = csvData.trim().split('\n');
            const labels = [];
            const prices = [];

            // Erste Zeile (Header) überspringen, dann Zeilen parsen
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',');
                if (cols.length >= 2) {
                    labels.push(cols[0]); // Zeitstempel
                    prices.push(parseFloat(cols[1])); // Preis_Euro
                }
            }

            // Diagramm zeichnen
            const ctx = document.getElementById('stromChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Börsenstrompreis (€/kWh)',
                        data: prices,
                        borderColor: '#2ca02c',
                        backgroundColor: 'rgba(44, 160, 44, 0.1)',
                        borderWidth: 3,
                        pointBackgroundColor: '#2ca02c',
                        pointRadius: 5,
                        pointHoverRadius: 8,
                        fill: true,
                        tension: 0.2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return ` Preis: ${context.raw.toFixed(2)} €/kWh`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            suggestedMax: 0.40,
                            title: {
                                display: true,
                                text: 'Euro / kWh'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: 'Zeitstempel (Deutschland)'
                            }
                        }
                    }
                }
            });
        })
        .catch(err => {
            console.error(err);
            alert("Fehler beim Laden der Live-Daten. Stelle sicher, dass die CSV-Datei existiert.");
        });
</script>
</body>
</html>
